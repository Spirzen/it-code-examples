<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тема</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #ffffff;
      --text: #1e1e2e;
      --card: #f4f4f5;
      --accent: #4361ee;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #11111b;
        --text: #cdd6f4;
        --card: #1e1e2e;
        --accent: #89b4fa;
      }
    }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
    }
    .card {
      max-width: 28rem;
      padding: 1.25rem;
      background: var(--card);
      border-radius: 12px;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Системная тема</h1>
    <p>Цвета в <code>:root</code>, тёмный набор — в <code>prefers-color-scheme: dark</code>.</p>
    <p><a href="#">Ссылка</a></p>
  </div>
</body>
</html>
