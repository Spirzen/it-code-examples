<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Пример внутренних стилей</title>
  <style media="screen">
    body {
      font-family: Arial, sans-serif;
      background-color: #fafafa;
    }
    h1 {
      color: #2c3e50;
    }
    .highlight {
      background-color: yellow;
    }
  </style>
</head>
<body>
  <h1>Заголовок</h1>
  <p class="highlight">Этот абзац выделен жёлтым.</p>
</body>
</html>
