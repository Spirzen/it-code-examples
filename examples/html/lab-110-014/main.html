<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Подвал</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, sans-serif;
    }
    main { flex: 1; padding: 2rem 1.25rem; }
    footer {
      background: #111827;
      color: #9ca3af;
      padding: 2rem 1.25rem 1rem;
    }
    .cols {
      max-width: 56rem;
      margin: 0 auto;
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
    }
    footer h3 { color: #f3f4f6; margin: 0 0 0.5rem; font-size: 1rem; }
    footer a { color: #93c5fd; text-decoration: none; display: block; margin-bottom: 0.35rem; }
    .copy {
      max-width: 56rem;
      margin: 1.5rem auto 0;
      padding-top: 1rem;
      border-top: 1px solid #374151;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main><h1>Страница</h1><p>Контент выше подвала.</p></main>
  <footer>
    <div class="cols">
      <div>
        <h3>Продукт</h3>
        <a href="#">Возможности</a>
        <a href="#">Тарифы</a>
      </div>
      <div>
        <h3>Компания</h3>
        <a href="#">О нас</a>
        <a href="#">Вакансии</a>
      </div>
      <div>
        <h3>Правовое</h3>
        <a href="#">Политика</a>
        <a href="#">Оферта</a>
      </div>
    </div>
    <p class="copy">© 2026 Пример</p>
  </footer>
</body>
</html>
