<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Страница не найдена</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    .error-page {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    .error-code {
      font-size: 6rem;
      font-weight: bold;
      color: #dc3545;
      margin: 0 0 1rem 0;
    }
    .error-message {
      font-size: 1.5rem;
      margin: 0 0 2rem 0;
      color: #666;
    }
    .btn-home {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .btn-home:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <p class="error-message">Страница не найдена</p>
    <p>К сожалению, запрашиваемая вами страница не существует.</p>
    <a href="/" class="btn-home">На главную</a>
  </div>
</body>
</html>
