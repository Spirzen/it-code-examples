<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Привет, DOM</title>
</head>
<body>
  <button type="button" id="hi">Нажми</button>
  <p id="out"></p>
  <script>
    const btn = document.getElementById('hi');
    const out = document.getElementById('out');
    btn.addEventListener('click', () => {
      out.textContent = 'Привет из DOM!';
    });
  </script>
</body>
</html>
