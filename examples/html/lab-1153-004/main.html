<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Расписание — HTML table</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1rem; }
    table { border-collapse: collapse; width: 100%; max-width: 32rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #eef2ff; }
    caption { caption-side: top; font-weight: 700; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h1>Расписание на понедельник</h1>
  <table>
    <caption>8 «А» класс</caption>
    <thead>
      <tr>
        <th scope="col">Урок</th>
        <th scope="col">Время</th>
        <th scope="col">Предмет</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">1</th>
        <td>08:30–09:15</td>
        <td>Информатика</td>
      </tr>
      <tr>
        <th scope="row">2</th>
        <td>09:25–10:10</td>
        <td>Математика</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
