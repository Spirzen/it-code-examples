<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      background: #eef2ff;
    }
    form {
      width: min(100%, 20rem);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 1.5rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    label { font-size: 0.9rem; color: #333; }
    input {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      margin-top: 0.25rem;
      padding: 0.65rem;
      border: none;
      border-radius: 8px;
      background: #2d6a4f;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <form>
    <h1 style="margin:0;font-size:1.25rem">Вход</h1>
    <label>Email <input type="email" required placeholder="you@mail.ru"></label>
    <label>Пароль <input type="password" required minlength="4"></label>
    <button type="submit">Войти</button>
  </form>
</body>
</html>
