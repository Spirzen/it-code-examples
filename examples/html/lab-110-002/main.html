<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Карточка по центру</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      background: #f0f4ff;
    }
    .card {
      width: min(100%, 22rem);
      padding: 1.5rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.35rem; }
    p { margin: 0 0 1rem; color: #444; }
    button {
      width: 100%;
      padding: 0.65rem;
      border: none;
      border-radius: 8px;
      background: #4361ee;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <article class="card">
    <h1>Добро пожаловать</h1>
    <p>Карточка по центру экрана.</p>
    <button type="button">Продолжить</button>
  </article>
</body>
</html>
