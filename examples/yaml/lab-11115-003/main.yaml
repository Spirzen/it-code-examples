apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-cm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-cm
  template:
    metadata:
      labels:
        app: web-cm
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: APP_MODE
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: web-config
            items:
              - key: index.html
                path: index.html
