name: Nightly smoke

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" https://httpbin.org/status/200)
          echo "HTTP code: $code"
          test "$code" = "200"
