# helm/myapp/values-production.yaml (переопределения для production)
replicaCount: 6

config:
  environment: production
  logLevel: warning
  requestTimeout: 30
  cacheTtl: 600

database:
  host: prod-db.internal
  port: 5432
  name: myapp_prod
  poolSize: 100

resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: 2000m
    memory: 4Gi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 6
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 4
