- name: Установка и настройка веб-сервера
  hosts: webservers
  become: yes
  vars:
    http_port: 80
  Задачи:
    - name: Установить Apache
      apt:
        name: apache2
        state: present
    - name: Запустить службу Apache
      service:
        name: apache2
        state: started
        enabled: yes
