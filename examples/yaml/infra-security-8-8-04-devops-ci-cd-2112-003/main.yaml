name: Сборка Go микросервиса

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build -o app
      - uses: actions/upload-artifact@v4
        with:
          name: binary
          path: app
