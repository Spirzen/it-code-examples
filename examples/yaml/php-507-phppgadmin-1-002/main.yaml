services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"

  web:
    image: php:8.2-apache
    volumes:
      - ./phppgadmin:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - db
