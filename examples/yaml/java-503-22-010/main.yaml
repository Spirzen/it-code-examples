  databaseChangeLog:
    - changeSet:
        id: 1
        author: timur
        changes:
          - createTable:
              tableName: users
              columns:
                - column:
                    name: id
                    type: bigint
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                - column:
                    name: email
                    type: varchar(255)
                    constraints:
                      nullable: false
                      unique: true
