apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: python-worker-keda
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: python-worker
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 30
  triggers:
  - type: rabbitmq
    metadata:
      queueName: tasks
      queueLength: "10"
      authRef:
        name: rabbitmq-auth
