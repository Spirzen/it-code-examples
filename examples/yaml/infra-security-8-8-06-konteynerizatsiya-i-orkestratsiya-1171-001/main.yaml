apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-backend
  template:
    metadata:
      labels:
        app: java-backend
    spec:
      containers:
        - name: app
          image: myregistry/java-backend:v1.2.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: java-backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: java-backend
spec:
  selector:
    app: java-backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: java-backend-config
data:
  DATABASE_URL: jdbc:postgresql://postgres.default.svc:5432/app
  REDIS_HOST: redis-master.default.svc
