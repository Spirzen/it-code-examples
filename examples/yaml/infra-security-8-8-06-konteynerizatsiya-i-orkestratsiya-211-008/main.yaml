apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: databases.example.com
spec:
  group: example.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                size:
                  type: string
                  pattern: '^[1-9][0-9]*Gi$'
  scope: Namespaced
  names:
    plural: databases
    singular: database
    kind: Database
    listKind: DatabaseList
